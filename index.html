<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escáner Evento</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; text-align: center; background: #f5f5f5; margin: 0; }
    #reader { width: 100%; max-width: 400px; margin: 10px auto; border: 3px solid #0f9d58; border-radius: 8px; overflow: hidden; }
    #result { margin-top: 20px; font-size: 20px; font-weight: bold; padding: 15px; border-radius: 8px; min-height: 50px; }
    .success { color: #0f9d58; background: #d9ead3; }
    .error { color: #d93025; background: #fce8e6; }
    input { padding: 12px; width: 85%; font-size: 16px; margin: 10px; border: 2px solid #ccc; border-radius: 5px; }
    button { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #0f9d58; color: white; border: none; border-radius: 5px; margin: 5px; }
    .btn-sec { background: #1a73e8; }
    .btn-warn { background: #f9ab00; }
    h2 { color: #202124; margin: 10px 0; }
    .contadores { display: flex; justify-content: space-around; font-size: 18px; margin: 15px 0; }
    .ok { color: #0f9d58; font-weight: bold; }
    .no { color: #d93025; font-weight: bold; }
    #lista { text-align: left; margin-top: 20px; max-height: 300px; overflow-y: auto; background: white; padding: 10px; border-radius: 8px; display: none; }
    #lista table { width: 100%; border-collapse: collapse; }
    #lista th, #lista td { padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
    #lista th { background: #f1f3f4; }
  </style>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <h2>🎯 Registro de Asistencia</h2>
  <div class="contadores">
    <div>✅ Entraron: <span id="total" class="ok">0</span></div>
    <div>❌ Rechazados: <span id="rechazados" class="no">0</span></div>
  </div>

  <div id="reader"></div>
  <div id="result">Apunta al QR del asistente</div>

  <input type="text" id="manual" placeholder="O escribe código EVT-XXX-001">
  <br>
  <button onclick="registrarManual()">Registrar Manual</button>
  <button onclick="location.reload()" class="btn-warn">Reiniciar Cámara</button>
  <button onclick="toggleLista()" class="btn-sec">Ver Lista Asistentes</button>

  <div id="lista"></div>

  <script>
    let totalEscaneados = 0;
    let totalRechazados = 0;
    let listaVisible = false;

    // Generador Sintético de Audio para evitar Base64 corruptos
    function playBeep(tipo) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (tipo === 'exito') {
          osc.frequency.setValueAtTime(587.33, ctx.currentTime); // Re5
          osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1); // La5
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        } else {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
        }
      } catch(e) { console.log("Audio no soportado interactúe primero con la pantalla"); }
    }

    function onScanSuccess(decodedText, decodedResult) {
      html5QrcodeScanner.pause();
      registrar(decodedText);
      setTimeout(() => { html5QrcodeScanner.resume(); }, 2500);
    }

    function registrarManual() {
      const codigo = document.getElementById('manual').value.trim();
      if (codigo) registrar(codigo);
    }

    async function registrar(codigo) {
  document.getElementById('result').innerHTML = 'Procesando código...';
  document.getElementById('result').className = '';

  // ⚠️ REEMPLAZA CON TU URL DE APPS SCRIPT (La que genera al implementar como Aplicación Web)
  const urlWebApp = "https://script.google.com/macros/s/AKfycbxjH1N_byfBA1M2y3h2UNZ7AAH3nOC8zZnXgAT7oLDHvHk3zgXDJficqGEQi5hexz9AHA/exec"; 

  try {
    // Creamos los parámetros que se enviarán por POST
    const formData = new FormData();
    formData.append("codigo", codigo);

    // Enviamos los datos a Google Apps Script
    const response = await fetch(urlWebApp, {
      method: "POST",
      body: formData
    });

    // Parseamos la respuesta JSON que nos mandará el servidor
    const res = await response.json();

    const div = document.getElementById('result');
    
    // Evaluamos la respuesta igual que lo hacías originalmente
    if (res.success) {
      totalEscaneados++;
      document.getElementById('total').textContent = totalEscaneados;
      div.className = 'success';
      div.innerHTML = '✅ ' + res.nombre + '<br>Hora: ' + res.hora;
      document.getElementById('manual').value = '';
      playBeep('exito');
      if (navigator.vibrate) navigator.vibrate(200);
      if (listaVisible) actualizarLista();
    } else {
      // Manejo de errores devueltos por tu lógica de negocio en la Sheet
       totalRechazados++;
      document.getElementById('rechazados').textContent = totalRechazados;
      div.className = 'error';
      div.innerHTML = '❌ ' + res.error;
      playBeep('error');
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

  } catch (error) {
    // Manejo de errores críticos de conexión (ej. sin internet o URL incorrecta)
    console.error("Error de red/servidor:", error);
    const div = document.getElementById('result');
    div.className = 'error';
    div.innerHTML = '❌ Error de conexión con el servidor.';
    playBeep('error');
  }
}

    function toggleLista() {
      listaVisible = !listaVisible;
      const divLista = document.getElementById('lista');
      if (listaVisible) {
        divLista.style.display = 'block';
        actualizarLista();
      } else {
        divLista.style.display = 'none';
      }
    }

    function actualizarLista() {
      document.getElementById('lista').innerHTML = 'Cargando asistentes...';
      google.script.run.withSuccessHandler(function(asistentes) {
        let html = '<table><tr><th>#</th><th>Nombre</th><th>Hora</th></tr>';
        asistentes.forEach((a, i) => {
          html += `<tr><td>${i+1}</td><td>${a.nombre}</td><td>${a.hora}</td></tr>`;
        });
        html += '</table>';
        if (asistentes.length === 0) html = 'Aún no hay asistentes en este momento.';
        document.getElementById('lista').innerHTML = html;
      }).obtenerListaAsistentes();
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      rememberLastUsedCamera: true
    });
    html5QrcodeScanner.render(onScanSuccess, (errorMessage) => {
      if (errorMessage.includes('NotAllowedError')) {
        document.getElementById('result').innerHTML = `
          ❌ Sin permiso de cámara<br>
          <small>Ve a Ajustes del navegador > Permisos > Permitir Cámara</small>
        `;
        document.getElementById('result').className = 'error';
      }
    });
  </script>
</body>
</html>
